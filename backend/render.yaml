services:
  - type: web
    name: sustainable-catalyst-feature-suggestions-ai
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SCFS_AI_PROVIDER
        value: deterministic
      - key: SCFS_AI_API_KEY
        generateValue: true
